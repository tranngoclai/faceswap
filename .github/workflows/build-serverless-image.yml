name: Build serverless image

# Builds and pushes the faceswap serverless worker base image to GHCR.
# Pattern mirrors facefusion-runpod-worker/.github/workflows/build-base-image.yml.
#
# Auth uses the built-in GITHUB_TOKEN — no registry secrets to manage.
# Public packages on ghcr.io have free, unlimited, rate-limit-free pulls.
#
# Trigger: explicit tag  sl-<version>  or manual dispatch.
#   git tag sl-1.0.0 && git push origin sl-1.0.0
# Image tag is derived from the part after `sl-` (e.g. sl-1.0.0 → 1.0.0).
# Also tagged `latest` and short SHA for traceability.

on:
  push:
    tags:
      - "sl-*"
    paths:
      - "docker/serverless/Dockerfile"
      - "requirements/_requirements_base.txt"
      - "requirements/requirements_nvidia_12.txt"
      - "scripts/cloud/dedupe_faces.py"
  workflow_dispatch:
    inputs:
      image_version:
        description: "Image version tag (e.g. 1.0.0)"
        required: false
        default: "1.0.0"

concurrency:
  # One build at a time; a newer push cancels an in-flight stale one.
  group: build-sl-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/faceswap-sl

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      # Resolve image version: from the `sl-*` tag suffix (sl-1.0.0 → 1.0.0)
      # on a tag push, or from the manual-dispatch input.
      - name: Resolve image version
        run: |
          if [ -n "${{ github.event.inputs.image_version }}" ]; then
            version="${{ github.event.inputs.image_version }}"
          else
            version="${GITHUB_REF_NAME#sl-}"
          fi
          echo "IMAGE_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name (ghcr requires lowercase).
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_VERSION }}
            type=raw,value=latest
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=faceswap-sl
            org.opencontainers.image.description=Faceswap serverless worker (CUDA 12.6 + torch cu126 + faceswap)

      # Use standard gzip (Docker format) so RunPod workers can pull the image.
      # zstd OCI format causes "manifest unknown" on older Docker daemons used
      # by RunPod GPU workers.
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/serverless/Dockerfile
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          provenance: false

      - name: Summary
        run: |
          {
            echo "### Serverless image pushed"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "Set this as \`sl_base_image\` in \`ansible/group_vars/cloud.yml\`:"
            echo '```'
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
