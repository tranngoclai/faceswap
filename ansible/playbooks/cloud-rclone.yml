---
# rclone push/pull the model dir <-> Google Drive (service account auth).
# gdrive_sa_json is read only from ansible/group_vars/google-account-vault.yml.
#   ansible-playbook playbooks/cloud-rclone.yml -e rclone_direction=push
#   ansible-playbook playbooks/cloud-rclone.yml -e rclone_direction=pull
- name: Faceswap rclone sync
  hosts: cloud
  gather_facts: false
  vars:
    rclone_direction: push
  vars_files:
    - ../group_vars/google-account-vault.yml
  roles:
    - faceswap_rclone
