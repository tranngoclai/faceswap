---
# Inject RunPod API key into vault.yml. Run once or re-run to rotate.
#
# Usage:
#   ansible-playbook playbooks/provision-runpod-key.yml \
#     -e runpod_api_key=rp_xxxxxxxxxxxxxxxx

- name: Validate runpod_api_key
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Require runpod_api_key
      ansible.builtin.assert:
        that: runpod_api_key | default('') | length > 0
        fail_msg: "Pass the key with: -e runpod_api_key=rp_xxxxxxxxxxxxxxxx"

- name: Upsert into vault
  ansible.builtin.import_playbook: vault-store-key.yml
  vars:
    vault_key: runpod_api_key
    vault_value: "{{ runpod_api_key }}"
