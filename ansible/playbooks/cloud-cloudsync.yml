---
# Install the on-instance cron that auto-runs `rclone copy` to Google Drive.
# gdrive_sa_json is read only from ansible/group_vars/google-account-vault.yml.
#   ansible-playbook playbooks/cloud-cloudsync.yml
- name: Faceswap cloud-sync cron
  hosts: cloud
  gather_facts: false
  vars_files:
    - ../group_vars/google-account-vault.yml

  roles:
    - faceswap_cloudsync
