---
# Install the on-instance cron that auto-runs `rclone copy` to Google Drive.
# OAuth token is read from vault.yml (rp_gdrive_token_json).
#   ansible-playbook playbooks/cloud-cloudsync.yml
- name: Faceswap cloud-sync cron
  hosts: cloud
  gather_facts: false
  vars_files:
    - ../group_vars/vault.yml

  roles:
    - faceswap_cloudsync
