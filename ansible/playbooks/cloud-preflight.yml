---
# Pre-training preflight checks on the VastAI instance.
# Run before cloud-train.yml to catch missing inputs early.
#
# Usage:
#   ansible-playbook playbooks/cloud-train-preflight.yml \
#     -e fs_workspace_name=alice-bob-001
- name: Faceswap training preflight
  hosts: cloud
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/cloud.yml
  vars:
    preflight_min_faces: 200

  tasks:
    - name: Check GPU is available (nvidia-smi)
      ansible.builtin.command:
        argv:
          - nvidia-smi
          - --query-gpu=name,memory.free
          - --format=csv,noheader
      register: gpu_check
      changed_when: false
      failed_when: gpu_check.rc != 0

    - name: Show GPU info
      ansible.builtin.debug:
        msg: "GPU: {{ gpu_check.stdout }}"

    - name: Check disk space (at least 20GB free on /workspace)
      ansible.builtin.command:
        argv: [df, -BG, /workspace]
      register: df_out
      changed_when: false

    - name: Assert sufficient disk space
      ansible.builtin.assert:
        that: >-
          (df_out.stdout_lines[1].split()[3] | regex_replace('G','') | int) >= 20
        fail_msg: "Less than 20GB free on /workspace. Free space before training."

    - name: Check face dir A exists and has PNGs
      ansible.builtin.find:
        paths: "{{ fs_faces_a }}"
        patterns: "*.png"
      register: faces_a

    - name: Check face dir B exists and has PNGs
      ansible.builtin.find:
        paths: "{{ fs_faces_b }}"
        patterns: "*.png"
      register: faces_b

    - name: Assert minimum face count (side A)
      ansible.builtin.assert:
        that: faces_a.matched >= preflight_min_faces
        fail_msg: >-
          Side A has only {{ faces_a.matched }} faces in {{ fs_faces_a }}.
          Minimum is {{ preflight_min_faces }}. Run cloud-sync-train-inputs.yml first.

    - name: Assert minimum face count (side B)
      ansible.builtin.assert:
        that: faces_b.matched >= preflight_min_faces
        fail_msg: >-
          Side B has only {{ faces_b.matched }} faces in {{ fs_faces_b }}.
          Minimum is {{ preflight_min_faces }}. Run cloud-sync-train-inputs.yml first.

    - name: Check for conflicting tmux training session
      ansible.builtin.command:
        argv: [tmux, has-session, -t, "{{ fs_train_session }}"]
      register: tmux_check
      changed_when: false
      failed_when: false

    - name: Assert no conflicting session
      ansible.builtin.assert:
        that: tmux_check.rc != 0
        fail_msg: >-
          Training session '{{ fs_train_session }}' already running in tmux.
          Attach with: tmux attach -t {{ fs_train_session }}

    - name: Preflight passed
      ansible.builtin.debug:
        msg:
          - "✓ GPU: {{ gpu_check.stdout }}"
          - "✓ Disk: sufficient"
          - "✓ Side A: {{ faces_a.matched }} faces"
          - "✓ Side B: {{ faces_b.matched }} faces"
          - "✓ No conflicting training session"
          - "Ready to run: ansible-playbook playbooks/cloud-train.yml"
