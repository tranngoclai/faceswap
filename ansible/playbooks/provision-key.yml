---
# Mint a WORKER cloud-copy key (instance_read + instance_write) and store it
# as an encrypted Vast account env var (VAST_API_KEY) for Serverless workers.
# For the CONTROL MACHINE deploy key, use provision-deploy-key.yml instead.
#
#   VAST_ADMIN_KEY=<primary> ansible-playbook playbooks/provision-key.yml
#   VAST_ADMIN_KEY=<primary> ansible-playbook playbooks/provision-key.yml -e set_account_env_var=true
- name: Provision scoped vast cloud-copy key
  hosts: localhost
  gather_facts: false
  vars:
    vast_admin_key: "{{ lookup('env', 'VAST_ADMIN_KEY') }}"
    vast_key_name: "faceswap-cloudcopy"
    set_account_env_var: true
  roles:
    - vast_cloudcopy_key
