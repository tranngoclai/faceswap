---
# Generic: upsert a single key-value pair into group_vars/vault.yml (AES256 encrypted).
# Run once or re-run to rotate.
#
# Usage:
#   ansible-playbook playbooks/provision-vault-key.yml \
#     -e vault_key=my_key -e vault_value=my_value

- name: Upsert key into vault.yml
  hosts: localhost
  gather_facts: false
  vars:
    vault_file: "{{ playbook_dir }}/../group_vars/vault.yml"
    vault_pass_file: "~/.config/ansible/vault-pass"
    tmp_vault: "/tmp/ansible_vault_plain.yml"

  tasks:
    - name: Require vault_key and vault_value
      ansible.builtin.assert:
        that:
          - vault_key | default('') | length > 0
          - vault_value | default('') | length > 0
        fail_msg: "Pass both: -e vault_key=<key> -e vault_value=<value>"

    - name: Require vault password file
      ansible.builtin.stat:
        path: "{{ vault_pass_file }}"
      register: _vp
      failed_when: not _vp.stat.exists

    - name: Decrypt vault.yml to temp file
      ansible.builtin.command:
        cmd: >
          ansible-vault decrypt
          --vault-password-file {{ vault_pass_file }}
          --output {{ tmp_vault }}
          {{ vault_file }}
      changed_when: true
      no_log: true

    - name: Upsert key in plaintext vault
      ansible.builtin.lineinfile:
        path: "{{ tmp_vault }}"
        regexp: "^{{ vault_key }}:"
        line: '{{ vault_key }}: "{{ vault_value }}"'
      no_log: true

    - name: Re-encrypt vault.yml
      ansible.builtin.command:
        cmd: >
          ansible-vault encrypt
          --vault-password-file {{ vault_pass_file }}
          --output {{ vault_file }}
          {{ tmp_vault }}
      changed_when: true
      no_log: true

    - name: Remove temp plaintext file
      ansible.builtin.file:
        path: "{{ tmp_vault }}"
        state: absent

    - name: Done
      ansible.builtin.debug:
        msg: "{{ vault_key }} injected into vault.yml. Safe to commit."
