---
# Encode a Google Drive SA JSON key as base64 and store it in vault.yml as
# `rp_gdrive_sa_json_b64` — the value injected into RunPod endpoint secrets.
#
# Run once or re-run to rotate.
#
# Usage:
#   ansible-playbook playbooks/vault-store-runpod-gdrive-key.yml \
#     -e gdrive_sa_key_file=~/Downloads/my-project-sa.json

- name: Store RunPod GDrive SA key (b64) in vault.yml
  hosts: localhost
  gather_facts: false
  vars:
    sa_key_file: "{{ gdrive_sa_key_file | default('~/.config/gdrive/service-account.json') }}"
    vault_file: "{{ playbook_dir }}/../group_vars/vault.yml"
    vault_pass_file: "~/.config/ansible/vault-pass"
    tmp_vault: "/tmp/ansible_vault_plain.yml"

  tasks:
    - name: Require vault password file
      ansible.builtin.stat:
        path: "{{ vault_pass_file }}"
      register: _vp
      failed_when: not _vp.stat.exists

    - name: Require service account JSON file
      ansible.builtin.stat:
        path: "{{ sa_key_file }}"
      register: _sa
      failed_when: not _sa.stat.exists

    - name: Base64-encode the SA JSON file
      ansible.builtin.command:
        cmd: "base64 -w 0 {{ sa_key_file }}"
      register: _b64
      changed_when: false
      no_log: true

    - name: Decrypt vault.yml to temp file
      ansible.builtin.command:
        cmd: >
          ansible-vault decrypt
          --vault-password-file {{ vault_pass_file }}
          --output {{ tmp_vault }}
          {{ vault_file }}
      changed_when: true
      no_log: true

    - name: Upsert rp_gdrive_sa_json_b64 in plaintext vault
      ansible.builtin.lineinfile:
        path: "{{ tmp_vault }}"
        regexp: "^rp_gdrive_sa_json_b64:"
        line: 'rp_gdrive_sa_json_b64: "{{ _b64.stdout }}"'
      no_log: true

    - name: Re-encrypt vault.yml
      ansible.builtin.command:
        cmd: >
          ansible-vault encrypt
          --vault-password-file {{ vault_pass_file }}
          --output {{ vault_file }}
          {{ tmp_vault }}
      changed_when: true
      no_log: true

    - name: Remove temp plaintext file
      ansible.builtin.file:
        path: "{{ tmp_vault }}"
        state: absent

    - name: Done
      ansible.builtin.debug:
        msg: "rp_gdrive_sa_json_b64 injected into vault.yml. Safe to commit."
