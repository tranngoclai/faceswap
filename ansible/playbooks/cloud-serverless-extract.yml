---
# Submit one extract job to the serverless endpoint (runs LOCAL). Worker pulls
# input from Drive, extracts faces on GPU, pushes faces back to Drive.
#   ansible-playbook playbooks/cloud-serverless-extract.yml \
#     -e sl_input=alice.mp4 -e sl_drive_src=/faceswap-extract/in -e sl_drive_dst=/faceswap-extract/faces
# VAST_DEPLOY_API_KEY is read from ~/.config/vastai/vast_deploy_key or env var.
# Worker's VAST_API_KEY (cloud-copy) is an encrypted Vast account env var — no env input needed.
- name: Submit faceswap serverless extract job
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/cloud.yml
  tasks:
    - name: Require deploy API key
      ansible.builtin.assert:
        that:
          - vast_deploy_api_key | length > 0
        fail_msg: >-
          VAST_DEPLOY_API_KEY not found. Set it via env var or store in
          ~/.config/vastai/vast_deploy_key (chmod 600).
          Run 'ansible-playbook playbooks/provision-key.yml' to create it.

    - name: Run serverless extract submit
      ansible.builtin.command:
        argv:
          - "{{ sl_python }}"
          - scripts/cloud/serverless_extract.py
          - submit
          - --input
          - "{{ sl_input }}"
          - --drive-src
          - "{{ sl_drive_src }}"
          - --drive-dst
          - "{{ sl_drive_dst }}"
          - --detector
          - "{{ sl_detector }}"
          - --aligner
          - "{{ sl_aligner }}"
          - --extract-size
          - "{{ sl_extract_size | string }}"
          - --extract-norm
          - "{{ sl_extract_norm }}"
          - --dedupe-threshold
          - "{{ sl_dedupe_threshold | string }}"
        chdir: "{{ playbook_dir }}/../.."
      environment:
        VAST_DEPLOY_API_KEY: "{{ vast_deploy_api_key }}"
        SL_ENDPOINT_NAME: "{{ sl_endpoint_name }}"
        SL_BASE_IMAGE: "{{ sl_base_image }}"
        SL_CONNECTION_ID: "{{ sl_connection_id | string }}"
        SL_DISK_GB: "{{ sl_disk_gb | string }}"
        SL_COLD_WORKERS: "{{ sl_cold_workers | string }}"
        SL_MAX_WORKERS: "{{ sl_max_workers | string }}"
        SL_INACTIVITY_TIMEOUT: "{{ sl_inactivity_timeout | string }}"
        SL_TRANSFER_TIMEOUT: "{{ sl_transfer_timeout | string }}"
        SL_TRANSFER_POLL_INTERVAL: "{{ sl_transfer_poll_interval | string }}"
      register: submit_out

    - name: Show job result
      ansible.builtin.debug:
        var: submit_out.stdout_lines
