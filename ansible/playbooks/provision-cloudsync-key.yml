---
# Cloud sync uses Google Drive service account (rclone) from Ansible vault.
# Rotate the credential with:
#   ansible-playbook playbooks/provision-gdrive-sa-key.yml -e gdrive_sa_key_file=~/path/to/sa.json
# Then run:
#   ansible-playbook playbooks/cloud-cloudsync.yml
#
# The playbook will write the JSON to /root/.config/gdrive/service-account.json on
# the instance and configure the rclone `gdrive` remote automatically.
- name: No-op - see comments above for setup instructions
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Cloud sync uses rclone + service account; no key provisioning required
      ansible.builtin.debug:
        msg: >-
          Store gdrive_sa_json in ansible/group_vars/google-account-vault.yml,
          then run: ansible-playbook playbooks/cloud-cloudsync.yml
