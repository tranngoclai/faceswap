---
# Cloud sync now uses Google Drive service account (rclone) instead of vastai cloud copy.
# No Ansible provisioning needed — set GDRIVE_SA_JSON directly in the Vast.ai console:
#
#   Vast.ai console → Template / Instance → Environment Variables
#   Key:   GDRIVE_SA_JSON
#   Value: <contents of your Google service account JSON key file>
#
# Then run:
#   ansible-playbook playbooks/cloud-cloudsync.yml
#
# The playbook will write the JSON to /root/.config/gdrive/service-account.json on
# the instance and configure the rclone `gdrive` remote automatically.
- name: No-op — see comments above for setup instructions
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Cloud sync uses rclone + service account; no key provisioning required
      ansible.builtin.debug:
        msg: >-
          Set GDRIVE_SA_JSON in the Vast.ai instance environment variables, then
          run: ansible-playbook playbooks/cloud-cloudsync.yml
