---
# Mint a CLOUD SYNC key (instance_read + instance_write) for the on-instance
# cron job that runs `vastai cloud copy` to push training data to Drive.
# Saved to ~/.config/vastai/vast_cloudsync_key on the control machine;
# Ansible writes it into the instance crontab environment via faceswap_cloudsync role.
#
#   VAST_ADMIN_KEY=<primary> ansible-playbook playbooks/provision-cloudsync-key.yml
- name: Provision cloud-sync cron key
  hosts: localhost
  gather_facts: false
  vars:
    vast_admin_key: "{{ lookup('env', 'VAST_ADMIN_KEY') }}"
    vast_cloudsync_key_name: "faceswap-cloudsync"
  tasks:
    - name: Require an admin/primary vast key
      ansible.builtin.assert:
        that: vast_admin_key | length > 0
        fail_msg: "Set VAST_ADMIN_KEY (admin/primary key) in the environment first."

    - name: Create cloud-sync API key (instance_read + instance_write)
      ansible.builtin.uri:
        url: "https://console.vast.ai/api/v0/auth/apikeys/"
        method: POST
        headers:
          Authorization: "Bearer {{ vast_admin_key }}"
        body_format: json
        body:
          name: "{{ vast_cloudsync_key_name }}"
          permissions:
            api:
              instance_read: {}
              instance_write: {}
        status_code: 200
      register: cs_key_response
      no_log: true

    - name: Hold key only in memory
      ansible.builtin.set_fact:
        vast_new_cloudsync_key: "{{ cs_key_response.json.key }}"
      no_log: true

    - name: Save cloud-sync key to ~/.config/vastai/vast_cloudsync_key (mode 600)
      ansible.builtin.copy:
        content: "{{ vast_new_cloudsync_key }}"
        dest: "~/.config/vastai/vast_cloudsync_key"
        mode: "0600"
      no_log: true

    - name: Show non-secret result
      ansible.builtin.debug:
        msg: >-
          Cloud-sync key id {{ cs_key_response.json.id }} created with name
          '{{ vast_cloudsync_key_name }}'; saved to ~/.config/vastai/vast_cloudsync_key.
          Re-deploy the cloud-sync role (cloud-cloudsync.yml) to push the new key into the crontab.
