---
# Provision or destroy GPU instance(s) via Terraform.
# Terraform state is stored encrypted in Ansible Vault.
#
# Usage:
#   ansible-playbook playbooks/terraform-manage-instance.yml                                    # provision VastAI (default)
#   ansible-playbook playbooks/terraform-manage-instance.yml -e plan=true                       # dry-run plan only
#   ansible-playbook playbooks/terraform-manage-instance.yml -e destroy=true                    # destroy
#   ansible-playbook playbooks/terraform-manage-instance.yml -e enable_runpod=true -e enable_vast=false
#   ansible-playbook playbooks/terraform-manage-instance.yml -e vast_gpu="RTX 3090" -e vast_max_price_per_hour=0.80
#
# After provision, run:
#   ansible-playbook playbooks/cloud-setup.yml

- name: GPU instance lifecycle via Terraform
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/cloud.yml
    - ../group_vars/vault.yml
    - ../group_vars/terraform-state-vault.yml
  vars:
    tf_dir: "{{ playbook_dir }}/../../terraform"
    tf_state_file: "{{ tf_dir }}/terraform.tfstate"
    vault_state_file: "{{ playbook_dir }}/../group_vars/terraform-state-vault.yml"
    vault_pass_file: "~/.config/ansible/vault-pass"

    plan: false     # set -e plan=true for dry-run (no state changes)
    destroy: false  # set -e destroy=true to tear down

    # Provider toggles (override with -e)
    enable_vast: true
    enable_runpod: false

    # VastAI knobs
    vast_gpu: "RTX 4090"
    vast_gpu_fallback: "RTX 3090"
    vast_num_gpus: 1
    vast_disk_gb: 60
    vast_image: "vastai/pytorch"
    vast_cuda_min: "12.8"
    vast_max_price_per_hour: 1.50
    vast_offer_type: "on-demand"
    vast_datacenter_only: false
    vast_ssh_alias: "vast-training"

    # RunPod serverless endpoint knobs (sourced from group_vars/cloud.yml)
    rp_template_id: "{{ rp_template_id }}"
    rp_workers_max: "{{ rp_workers_max }}"
    rp_idle_timeout: "{{ rp_idle_timeout }}"
    rp_execution_timeout_ms: 200000
    rp_scaler_type: "QUEUE_DELAY"
    rp_scaler_value: 4

  tasks:
    # ── Restore state from vault ───────────────────────────────────────────────
    - name: Restore Terraform state from vault
      ansible.builtin.copy:
        content: "{{ tf_state_b64 | b64decode }}"
        dest: "{{ tf_state_file }}"
        mode: "0600"
      when: tf_state_b64 | default('') | length > 0

    - name: Abort destroy — no state in vault
      ansible.builtin.fail:
        msg: "tf_state_b64 is empty in vault — nothing to destroy."
      when:
        - destroy | bool
        - tf_state_b64 | default('') | length == 0

    # ── Terraform vars (shared between plan and apply/destroy) ───────────────
    - name: Set shared Terraform env vars
      ansible.builtin.set_fact:
        tf_env:
          TF_VAR_vast_api_key: "{{ vast_admin_key }}"
          TF_VAR_runpod_api_key: "{{ runpod_api_key | default('') }}"
          TF_VAR_enable_vast: "{{ enable_vast | bool | string | lower }}"
          TF_VAR_enable_runpod: "{{ enable_runpod | bool | string | lower }}"
          TF_VAR_vast_gpu: "{{ vast_gpu }}"
          TF_VAR_vast_gpu_fallback: "{{ vast_gpu_fallback }}"
          TF_VAR_vast_num_gpus: "{{ vast_num_gpus }}"
          TF_VAR_vast_disk_gb: "{{ vast_disk_gb }}"
          TF_VAR_vast_image: "{{ vast_image }}"
          TF_VAR_vast_cuda_min: "{{ vast_cuda_min }}"
          TF_VAR_vast_max_price_per_hour: "{{ vast_max_price_per_hour }}"
          TF_VAR_vast_offer_type: "{{ vast_offer_type }}"
          TF_VAR_vast_datacenter_only: "{{ vast_datacenter_only | bool | string | lower }}"
          TF_VAR_rp_template_id: "{{ rp_template_id }}"
          TF_VAR_rp_workers_max: "{{ rp_workers_max }}"
          TF_VAR_rp_idle_timeout: "{{ rp_idle_timeout }}"
          TF_VAR_rp_execution_timeout_ms: "{{ rp_execution_timeout_ms }}"
          TF_VAR_rp_scaler_type: "{{ rp_scaler_type }}"
          TF_VAR_rp_scaler_value: "{{ rp_scaler_value }}"

    # ── Terraform plan (dry-run, no state changes) ────────────────────────────
    - name: Terraform plan
      ansible.builtin.command:
        argv: [terraform, plan]
        chdir: "{{ tf_dir }}"
      environment: "{{ tf_env }}"
      register: tf_plan_out
      changed_when: false
      when: plan | bool

    - name: Show plan output
      ansible.builtin.debug:
        msg: "{{ tf_plan_out.stdout_lines }}"
      when: plan | bool

    - name: Plan complete — no state changes made
      ansible.builtin.meta: end_play
      when: plan | bool

    # ── Terraform apply / destroy ──────────────────────────────────────────────
    - name: "Terraform {{ destroy | bool | ternary('destroy', 'apply') }}"
      community.general.terraform:
        project_path: "{{ tf_dir }}"
        state: "{{ destroy | bool | ternary('absent', 'present') }}"
        force_init: true
        variables:
          vast_api_key: "{{ vast_admin_key if vast_admin_key | default('') else 'placeholder' }}"
          runpod_api_key: "{{ runpod_api_key | default('') }}"
          enable_vast: "{{ enable_vast | bool }}"
          enable_runpod: "{{ enable_runpod | bool }}"
          vast_gpu: "{{ vast_gpu }}"
          vast_gpu_fallback: "{{ vast_gpu_fallback }}"
          vast_num_gpus: "{{ vast_num_gpus }}"
          vast_disk_gb: "{{ vast_disk_gb }}"
          vast_image: "{{ vast_image }}"
          vast_cuda_min: "{{ vast_cuda_min }}"
          vast_max_price_per_hour: "{{ vast_max_price_per_hour }}"
          vast_offer_type: "{{ vast_offer_type }}"
          vast_datacenter_only: "{{ vast_datacenter_only | bool }}"
          rp_template_id: "{{ rp_template_id }}"
          rp_workers_max: "{{ rp_workers_max }}"
          rp_idle_timeout: "{{ rp_idle_timeout }}"
          rp_execution_timeout_ms: "{{ rp_execution_timeout_ms }}"
          rp_scaler_type: "{{ rp_scaler_type }}"
          rp_scaler_value: "{{ rp_scaler_value }}"
      register: tf_result

    # ── Persist state to vault ─────────────────────────────────────────────────
    - name: Read Terraform state post-apply
      ansible.builtin.slurp:
        src: "{{ tf_state_file }}"
      register: tf_state_raw
      when: not destroy | bool

    - name: Write vault file with new state
      ansible.builtin.copy:
        content: |
          ---
          # Managed by terraform-manage-instance.yml — do not edit tf_state_b64 by hand.
          tf_state_b64: "{{ tf_state_raw.content }}"
        dest: "{{ vault_state_file }}"
        mode: "0600"
      when: not destroy | bool

    - name: Write vault file with cleared state
      ansible.builtin.copy:
        content: |
          ---
          # Managed by terraform-manage-instance.yml — state cleared after destroy.
          tf_state_b64: ""
        dest: "{{ vault_state_file }}"
        mode: "0600"
      when: destroy | bool

    - name: Encrypt vault state file
      ansible.builtin.command:
        cmd: >
          ansible-vault encrypt
          --vault-password-file {{ vault_pass_file }}
          {{ vault_state_file }}
      changed_when: true

    # ── Post-destroy cleanup ───────────────────────────────────────────────────
    - name: Remove local terraform.tfstate after destroy
      ansible.builtin.file:
        path: "{{ tf_state_file }}"
        state: absent
      when: destroy | bool

    # ── Parse outputs (provision only) ────────────────────────────────────────
    # community.general.terraform exposes outputs at tf_result.outputs
    - name: Extract Terraform outputs
      ansible.builtin.set_fact:
        tf_out: "{{ tf_result.outputs }}"
      when: not destroy | bool

    # ── Update cloud.yml ───────────────────────────────────────────────────────
    - name: Update cc_instance_id in cloud.yml
      ansible.builtin.replace:
        path: "{{ playbook_dir }}/../group_vars/cloud.yml"
        regexp: '^cc_instance_id:.*$'
        replace: >-
          cc_instance_id: "{{ (not destroy | bool) | ternary(tf_out.vast_instance_id.value | default(''), '') }}"
      when: enable_vast | bool

    - name: Update rp_endpoint_id in cloud.yml
      ansible.builtin.replace:
        path: "{{ playbook_dir }}/../group_vars/cloud.yml"
        regexp: '^rp_endpoint_id:.*$'
        replace: >-
          rp_endpoint_id: "{{ (not destroy | bool) | ternary(tf_out.runpod_endpoint_id.value | default(''), '') }}"  # managed by cloud-provision-instance.yml — do not edit manually
      when: enable_runpod | bool

    # ── SSH config (VastAI provision only) ────────────────────────────────────
    - name: Read current ~/.ssh/config
      ansible.builtin.slurp:
        src: "~/.ssh/config"
      register: ssh_config_raw
      failed_when: false
      when:
        - not destroy | bool
        - enable_vast | bool

    - name: Remove existing SSH alias block
      ansible.builtin.set_fact:
        ssh_config_clean: >-
          {{ (ssh_config_raw.content | default('') | b64decode)
             | regex_replace('(?ms)^Host[ \t]+' + vast_ssh_alias + '[^\n]*\n(?:(?!^Host[ \t]).*\n?)*', '') }}
      when:
        - not destroy | bool
        - enable_vast | bool

    - name: Write updated ~/.ssh/config
      ansible.builtin.copy:
        content: |
          {{ ssh_config_clean }}
          Host {{ vast_ssh_alias }}
              HostName {{ tf_out.vast_ssh_host.value }}
              Port {{ tf_out.vast_ssh_port.value }}
              User root
              IdentityFile ~/.ssh/id_ed25519
              StrictHostKeyChecking no
        dest: "~/.ssh/config"
        mode: "0600"
      when:
        - not destroy | bool
        - enable_vast | bool
        - tf_out.vast_ssh_host.value is defined

    - name: Wait for SSH port
      ansible.builtin.wait_for:
        host: "{{ tf_out.vast_ssh_host.value }}"
        port: "{{ tf_out.vast_ssh_port.value }}"
        timeout: 120
      when:
        - not destroy | bool
        - enable_vast | bool
        - tf_out.vast_ssh_host.value is defined

    - name: Smoke-test GPU (nvidia-smi)
      ansible.builtin.command:
        argv:
          - ssh
          - -o
          - StrictHostKeyChecking=no
          - -o
          - ConnectTimeout=10
          - -p
          - "{{ tf_out.vast_ssh_port.value | string }}"
          - "root@{{ tf_out.vast_ssh_host.value }}"
          - "nvidia-smi --query-gpu=name,memory.total --format=csv,noheader"
      register: gpu_check
      changed_when: false
      when:
        - not destroy | bool
        - enable_vast | bool
        - tf_out.vast_ssh_host.value is defined

    # ── Summary ────────────────────────────────────────────────────────────────
    - name: Done
      ansible.builtin.debug:
        msg: "{{ summary_lines }}"
      vars:
        summary_lines: >-
          {{
            ['================================================'] +
            (['VastAI instance ' + (tf_out.vast_instance_id.value | default('?')) + ' READY',
              'GPU:  ' + (gpu_check.stdout | default('?')),
              'Cost: $' + (tf_out.vast_cost_per_hour.value | default('?') | string) + '/hr',
              'SSH:  ssh ' + vast_ssh_alias,
              '',
              'Next: ansible-playbook playbooks/cloud-setup.yml']
             if (not destroy | bool and enable_vast | bool) else []) +
            (['RunPod serverless endpoint ' + (tf_out.runpod_endpoint_id.value | default('?')) + ' READY',
              'Submit jobs: ansible-playbook playbooks/runpod-extract-faces.yml']
             if (not destroy | bool and enable_runpod | bool) else []) +
            (['All resources destroyed. State cleared from vault.']
             if destroy | bool else []) +
            ['================================================']
          }}
