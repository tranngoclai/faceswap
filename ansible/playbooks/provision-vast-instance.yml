---
# Create a vast.ai GPU instance ready for faceswap training.
# Runs on the LOCAL control machine (calls vastai CLI + patches ~/.ssh/config).
#
# Usage:
#   ansible-playbook playbooks/provision-vast-instance.yml
#   ansible-playbook playbooks/provision-vast-instance.yml \
#     -e vast_gpu="RTX_3090" -e vast_disk=80 -e vast_cuda_min=12.6
#
# After this play succeeds, run:
#   ansible-playbook playbooks/cloud-setup.yml
- name: Provision vast.ai GPU instance for training
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/vault.yml
  environment:
    VAST_API_KEY: "{{ vast_api_key }}"
  vars:
    vast_gpu: "RTX_4090"           # GPU model name as used in vast search
    vast_gpu_fallback: "RTX_3090"  # fallback if primary GPU has no offers
    vast_cuda_min: "12.8"          # minimum CUDA version
    vast_disk: 60                  # minimum disk space in GB
    vast_image: "vastai/base-image" # docker image; MUST NOT be vastai/tensorflow
    vast_ssh_alias: "vast-training" # ~/.ssh/config Host alias (matches inventory.ini)

    vastai_bin: "vastai"

  tasks:
    - name: Require Vast API key
      ansible.builtin.assert:
        that:
          - vast_api_key | length > 0
        fail_msg: "Set vast_api_key in ansible/group_vars/vault.yml with ansible-vault."

    - name: Check vastai CLI is installed
      ansible.builtin.command:
        argv:
          - "{{ vastai_bin }}"
          - --version
      register: vastai_version
      changed_when: false
      failed_when: vastai_version.rc != 0

    - name: Show vastai version
      ansible.builtin.debug:
        msg: "vastai CLI: {{ vastai_version.stdout }}"

    - name: Search offers for {{ vast_gpu }}
      ansible.builtin.command:
        argv:
          - "{{ vastai_bin }}"
          - search
          - offers
          - "gpu_name={{ vast_gpu }} num_gpus=1 disk_space>={{ vast_disk }} cuda_vers>={{ vast_cuda_min }}"
          - --storage
          - "{{ vast_disk | string }}"
          - -o
          - dph_total
          - --limit
          - "5"
          - --raw
      register: search_primary
      changed_when: false
      failed_when: false

    - name: Search offers for {{ vast_gpu_fallback }} (fallback)
      ansible.builtin.command:
        argv:
          - "{{ vastai_bin }}"
          - search
          - offers
          - "gpu_name={{ vast_gpu_fallback }} num_gpus=1 disk_space>={{ vast_disk }} cuda_vers>={{ vast_cuda_min }}"
          - --storage
          - "{{ vast_disk | string }}"
          - -o
          - dph_total
          - --limit
          - "5"
          - --raw
      register: search_fallback
      changed_when: false
      failed_when: false
      when: ((search_primary.stdout | default('') or '[]') | from_json | length) == 0

    - name: Resolve best offer
      ansible.builtin.set_fact:
        vast_offers: >-
          {{ ((search_primary.stdout | default('') or '[]') | from_json)
             if ((search_primary.stdout | default('') or '[]') | from_json | length) > 0
             else ((search_fallback.stdout | default('') or '[]') | from_json) }}

    - name: Assert at least one offer found
      ansible.builtin.assert:
        that: vast_offers | length > 0
        fail_msg: >-
          No offers found for {{ vast_gpu }} or {{ vast_gpu_fallback }} with
          CUDA >= {{ vast_cuda_min }} and disk >= {{ vast_disk }}GB.
          Try: vastai search offers 'gpu_name=RTX_4090 ...' --full
      when: not ansible_check_mode

    - name: Pick cheapest offer
      ansible.builtin.set_fact:
        vast_offer: "{{ vast_offers | sort(attribute='dph_total') | first }}"
      when: not ansible_check_mode

    - name: Show selected offer
      ansible.builtin.debug:
        msg: >-
          Selected offer id={{ vast_offer.id }}
          gpu={{ vast_offer.gpu_name }}
          dph=${{ vast_offer.dph_total | round(4) }}
          cuda={{ vast_offer.cuda_max_good }}
          disk={{ vast_offer.disk_space }}GB
      when: not ansible_check_mode

    - name: Create instance from offer {{ vast_offer.id | default('(check mode)') }}
      ansible.builtin.command:
        argv:
          - "{{ vastai_bin }}"
          - create
          - instance
          - "{{ vast_offer.id | string }}"
          - --image
          - "{{ vast_image }}"
          - --disk
          - "{{ vast_disk | string }}"
          - --ssh
          - --direct
          - --env
          - "-e FACESWAP_BACKEND=nvidia -e KERAS_BACKEND=torch"
          - --raw
      register: create_result
      changed_when: true
      when: not ansible_check_mode

    - name: Parse instance ID from create response
      ansible.builtin.set_fact:
        vast_instance_id: "{{ (create_result.stdout | from_json).new_contract }}"
      when: not ansible_check_mode

    - name: Show instance ID
      ansible.builtin.debug:
        msg: "Instance created: id={{ vast_instance_id }}. Waiting for it to become running..."
      when: not ansible_check_mode

    - name: Wait for instance to reach 'running' status
      ansible.builtin.command:
        argv:
          - "{{ vastai_bin }}"
          - show
          - instance
          - "{{ vast_instance_id }}"
          - --raw
      register: instance_info
      changed_when: false
      retries: 30
      delay: 10
      until: (instance_info.stdout | from_json).actual_status == 'running'
      when: not ansible_check_mode

    - name: Parse SSH connection details
      ansible.builtin.set_fact:
        vast_ssh_host: "{{ (instance_info.stdout | from_json).ssh_host }}"
        vast_ssh_port: "{{ (instance_info.stdout | from_json).ssh_port }}"
      when: not ansible_check_mode

    - name: Show SSH details
      ansible.builtin.debug:
        msg: "Instance running — ssh root@{{ vast_ssh_host }} -p {{ vast_ssh_port }}"
      when: not ansible_check_mode

    - name: Read current ~/.ssh/config
      ansible.builtin.slurp:
        src: "~/.ssh/config"
      register: ssh_config_raw
      failed_when: false  # file may not exist yet
      when: not ansible_check_mode

    - name: Remove existing vast-training block (if any)
      ansible.builtin.set_fact:
        ssh_config_clean: >-
          {{ (ssh_config_raw.content | default('') | b64decode)
             | regex_replace('(?ms)^Host[ \t]+' + vast_ssh_alias + '[^\n]*\n(?:(?!^Host[ \t]).*\n?)*', '') }}
      when: not ansible_check_mode

    - name: Write updated ~/.ssh/config
      ansible.builtin.copy:
        content: |
          {{ ssh_config_clean }}
          Host {{ vast_ssh_alias }}
              HostName {{ vast_ssh_host }}
              Port {{ vast_ssh_port }}
              User root
              IdentityFile ~/.ssh/id_ed25519
              StrictHostKeyChecking no
        dest: "~/.ssh/config"
        mode: "0600"
      when: not ansible_check_mode

    - name: Update cc_instance_id in group_vars/cloud.yml
      ansible.builtin.replace:
        path: "{{ playbook_dir }}/../group_vars/cloud.yml"
        regexp: '^cc_instance_id:.*$'
        replace: 'cc_instance_id: "{{ vast_instance_id }}"'
      when: not ansible_check_mode

    - name: Wait for SSH port to accept connections
      ansible.builtin.wait_for:
        host: "{{ vast_ssh_host }}"
        port: "{{ vast_ssh_port }}"
        timeout: 60
      when: not ansible_check_mode

    - name: Smoke-test SSH connection (nvidia-smi)
      ansible.builtin.command:
        argv:
          - ssh
          - -o
          - StrictHostKeyChecking=no
          - -o
          - ConnectTimeout=10
          - -p
          - "{{ vast_ssh_port | string }}"
          - "root@{{ vast_ssh_host }}"
          - "nvidia-smi --query-gpu=name,memory.total --format=csv,noheader"
      register: gpu_check
      changed_when: false
      when: not ansible_check_mode

    - name: Provision complete
      ansible.builtin.debug:
        msg:
          - "================================================"
          - "Instance {{ vast_instance_id }} is READY"
          - "GPU:  {{ gpu_check.stdout }}"
          - "SSH:  ssh root@{{ vast_ssh_host }} -p {{ vast_ssh_port }}"
          - "      (alias: ssh {{ vast_ssh_alias }})"
          - ""
          - "Next steps:"
          - "  ansible-playbook playbooks/cloud-setup.yml"
          - "  rsync -avz workspace/train/ root@{{ vast_ssh_host }}:/workspace/train/"
          - "  ansible-playbook playbooks/cloud-train.yml"
          - "================================================"
      when: not ansible_check_mode
