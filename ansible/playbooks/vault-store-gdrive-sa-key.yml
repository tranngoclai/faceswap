---
# Encrypt a Google Drive service account JSON key into
# ansible/group_vars/google-account-vault.yml. Run once or re-run to rotate.
#
# Prerequisites:
#   1. Create vault password file (one-time):
#        echo "your-vault-password" > ~/.config/ansible/vault-pass && chmod 600 ~/.config/ansible/vault-pass
#   2. Download service account JSON from Google Cloud Console.
#
# Usage:
#   ansible-playbook playbooks/provision-gdrive-sa-key.yml \
#     -e gdrive_sa_key_file=~/Downloads/my-project-sa.json
#
# Then commit:
#   git add ansible/group_vars/google-account-vault.yml

- name: Encrypt Google Drive service account key into google-account-vault.yml
  hosts: localhost
  gather_facts: false
  vars:
    sa_key_file: "{{ gdrive_sa_key_file | default('~/.config/gdrive/service-account.json') }}"
    vault_file: "{{ playbook_dir }}/../group_vars/google-account-vault.yml"
    vault_pass_file: "~/.config/ansible/vault-pass"

  tasks:
    - name: Require vault password file
      ansible.builtin.stat:
        path: "{{ vault_pass_file }}"
      register: _vault_pass_stat
      failed_when: not _vault_pass_stat.stat.exists

    - name: Require service account JSON file
      ansible.builtin.stat:
        path: "{{ sa_key_file }}"
      register: _sa_stat
      failed_when: not _sa_stat.stat.exists

    - name: Encrypt service account JSON with ansible-vault
      ansible.builtin.shell:
        cmd: >-
          ansible-vault encrypt_string
          --vault-password-file {{ vault_pass_file }}
          --stdin-name gdrive_sa_json
          < {{ sa_key_file }}
      register: _encrypted
      no_log: true
      changed_when: true

    - name: Write encrypted value to google-account-vault.yml
      ansible.builtin.copy:
        content: |
          ---
          # Google service account JSON vault. Safe to commit — value is AES256 encrypted.
          # Rotate with: ansible-playbook playbooks/provision-gdrive-sa-key.yml -e gdrive_sa_key_file=~/path/to/sa.json
          # Vault password file: ~/.config/ansible/vault-pass  (local only, never commit)
          {{ _encrypted.stdout }}
        dest: "{{ vault_file }}"
        mode: "0644"
      no_log: true

    - name: Done
      ansible.builtin.debug:
        msg: >-
          google-account-vault.yml updated. Next:
          git add ansible/group_vars/google-account-vault.yml
