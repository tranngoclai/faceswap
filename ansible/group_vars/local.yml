---
# Control-machine config (Docker extract/convert).

# Repo root = two levels up from playbooks/ (ansible/playbooks -> ansible -> repo).
fs_repo_root: "{{ playbook_dir | dirname | dirname }}"
faceswap_dir: "{{ fs_repo_root }}"           # native faceswap repo == this repo
local_python: "python3"                       # used when fs_local_backend == native

# Standalone dedupe/sharp outputs.
fs_dedup_out: "{{ fs_faces_out }}_dedup"
fs_sharp_out: "{{ fs_faces_out }}_sharp"
