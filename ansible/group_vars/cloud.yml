---
# Cloud-only config (the vast.ai GPU instance).

# Interpreter / pip on the instance (vast base image ships a venv at /venv/main).
faceswap_python: "/venv/main/bin/python"
faceswap_pip: "/venv/main/bin/pip"

# CUDA requirements file (match the instance CUDA): _12 = cu126, _13 = cu130.
faceswap_req_file: "requirements/requirements_nvidia_13.txt"
faceswap_skip_torch: false                   # true = install base deps only (keep image torch)

# Workspace name — must be unique per run; reusing overwrites prior train artifacts.
fs_workspace_name: "alice-bob-001"

# Google Drive root (configured by faceswap_cloudsync role).
gdrive_remote_name: "gdrive"
gdrive_root_folder_id: ""                         # REQUIRED: shared folder ID set by operator
gdrive_root: "{{ gdrive_remote_name }}:"
gdrive_workspace: "{{ gdrive_root }}{{ fs_workspace_name }}"
gdrive_source_a: "{{ gdrive_workspace }}/source/A"
gdrive_source_b: "{{ gdrive_workspace }}/source/B"
gdrive_extract_a: "{{ gdrive_workspace }}/extract/A"
gdrive_extract_b: "{{ gdrive_workspace }}/extract/B"
gdrive_train_root: "{{ gdrive_workspace }}/train"
gdrive_train_input_a: "{{ gdrive_train_root }}/input_A"
gdrive_train_input_b: "{{ gdrive_train_root }}/input_B"
gdrive_train_model: "{{ gdrive_train_root }}/model"
gdrive_sa_file: "/root/.config/gdrive/service-account.json"

# Training data (absolute paths under /workspace, persisted on the instance).
fs_faces_a: "/workspace/train/input_aligned"
fs_faces_b: "/workspace/train/output/faces_full"
fs_train_model_dir: "/workspace/train/model"

# Training hyperparameters.
fs_trainer: "original"                        # original | phaze-a | villain | dfl-sae | ...
fs_batch_size: 16
fs_iterations: 1000000
fs_save_interval: 250
fs_snapshot_interval: 25000

# TensorBoard.
fs_tb_port: 6006

# tmux session names.
fs_train_session: "fs"
fs_board_session: "tb"

# rclone auto-sync — push model artifacts back to Drive.
cc_sync_src: "{{ fs_train_model_dir }}"
cc_sync_dst: "{{ gdrive_train_model }}"
cc_interval_min: 10

# VastAI instance ID (updated by provision-vast-instance.yml — do not edit manually).
cc_instance_id: ""

# ---------------------------------------------------------------------------
# RunPod Serverless extract endpoint (scripts/cloud/serverless_extract.py).
# Submit runs on the CONTROL machine (needs `pip install requests`). The worker
# pulls input + pushes faces via `rclone copy` to/from Google Drive using a
# service account (GDRIVE_SA_JSON_B64 RunPod endpoint secret).
# ---------------------------------------------------------------------------
# Absolute path (the `command` module does not expand ~); interpreter with `requests`.
rp_python: "{{ lookup('env', 'HOME') }}/.local/pipx/venvs/runpod/bin/python3"
rp_endpoint_id: "6kpdf1l7s6jq7t"              # RunPod endpoint ID

# Serverless extract submit params (override with -e).
sl_input: "alice.mp4"                         # filename inside gdrive_source_a or _b
sl_side: "A"                                  # A or B
sl_detector: "{{ fs_detector }}"
sl_aligner: "{{ fs_aligner }}"
sl_extract_size: "{{ fs_extract_size }}"
sl_extract_norm: "{{ fs_extract_norm }}"
sl_dedupe_threshold: "{{ fs_dedup_threshold }}"
sl_timeout: 600                               # client-side wait for /runsync (seconds)
