---
# Mint a minimal cloud-copy key and optionally store it as an encrypted Vast
# account environment variable. Secret-bearing tasks must stay no_log.
#
# Route-level permission constraints (e.g. api.instance.show, api.commands.rclone)
# are rejected by the Vast API for standard accounts. Use category-level
# instance_read + instance_write, which cover: vastai show instance and
# vastai cloud copy — the only two CLI calls the worker makes.

- name: Require an admin/primary vast key
  ansible.builtin.assert:
    that: vast_admin_key | length > 0
    fail_msg: "Set VAST_ADMIN_KEY (admin/primary key) in the environment first."

- name: Create and store scoped cloud-copy credential
  block:
    - name: Create route-scoped cloud-copy API key
      ansible.builtin.uri:
        url: "https://console.vast.ai/api/v0/auth/apikeys/"
        method: POST
        headers:
          Authorization: "Bearer {{ vast_admin_key }}"
        body_format: json
        body:
          name: "{{ vast_key_name }}"
          permissions:
            api:
              instance_read: {}
              instance_write: {}
        status_code: 200
      register: key_response
      no_log: true

    - name: Hold scoped key only in memory for this play
      ansible.builtin.set_fact:
        vast_scoped_key: "{{ key_response.json.key }}"
      no_log: true

    - name: Read Vast account environment variable names
      ansible.builtin.uri:
        url: "https://console.vast.ai/api/v0/secrets/"
        method: GET
        headers:
          Authorization: "Bearer {{ vast_admin_key }}"
        status_code: 200
      register: env_vars_response
      when: set_account_env_var | bool
      no_log: true

    - name: Create or update encrypted account VAST_API_KEY
      ansible.builtin.uri:
        url: "https://console.vast.ai/api/v0/secrets/"
        method: >-
          {{ 'PUT' if 'VAST_API_KEY' in (env_vars_response.json.secrets | default({})) else 'POST' }}
        headers:
          Authorization: "Bearer {{ vast_admin_key }}"
        body_format: json
        body:
          key: VAST_API_KEY
          value: "{{ vast_scoped_key }}"
        status_code: 200
      when: set_account_env_var | bool
      no_log: true
  rescue:
    - name: Revoke newly-created key after provisioning failure
      ansible.builtin.uri:
        url: "https://console.vast.ai/api/v0/auth/apikeys/{{ key_response.json.id }}/"
        method: DELETE
        headers:
          Authorization: "Bearer {{ vast_admin_key }}"
        status_code: 200
      when:
        - key_response is defined
        - key_response.json is defined
        - key_response.json.id is defined
      no_log: true

    - name: Stop after credential provisioning failure
      ansible.builtin.fail:
        msg: >-
          Cloud-copy credential provisioning failed; no usable new credential
          remains (a partially-created key is revoked automatically).

- name: Show non-secret provisioning result
  ansible.builtin.debug:
    msg: >-
      Scoped cloud-copy key id {{ key_response.json.id }} created;
      account VAST_API_KEY {{ 'configured' if set_account_env_var | bool else 'not requested' }}.
