---
# On-instance cron: rclone copy to push training data to Google Drive every N minutes.
# Authenticates via OAuth token from vault.yml (rp_gdrive_token_json).

- name: Configure rclone remote
  ansible.builtin.include_role:
    name: faceswap_rclone

- name: Require gdrive sync destination
  ansible.builtin.assert:
    that: cc_sync_dst | length > 0
    fail_msg: "cc_sync_dst must be set (derived from gdrive_train_model in cloud.yml)."

- name: Deploy cloud-sync runner
  ansible.builtin.template:
    src: cloud-sync.sh.j2
    dest: /root/cloud-sync.sh
    mode: "0755"

- name: Remove stale VAST_API_KEY crontab env line (if present from old setup)
  ansible.builtin.cron:
    name: VAST_API_KEY
    env: true
    state: absent

- name: Schedule the rclone cloud-sync
  ansible.builtin.cron:
    name: faceswap-cloud-sync
    minute: "*/{{ cc_interval_min }}"
    job: "/root/cloud-sync.sh"
