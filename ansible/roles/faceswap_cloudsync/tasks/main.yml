---
# On-instance cron: rclone copy to push training data to Google Drive every N minutes.
# Authenticates via gdrive_sa_json from ansible/group_vars/google-account-vault.yml.

- name: Require gdrive_sa_json
  ansible.builtin.assert:
    that: gdrive_sa_json | length > 0
    fail_msg: "Run playbooks/provision-gdrive-sa-key.yml to populate google-account-vault.yml first."

- name: Ensure gdrive credentials dir
  ansible.builtin.file:
    path: /root/.config/gdrive
    state: directory
    mode: "0700"

- name: Write service account JSON to disk
  ansible.builtin.copy:
    content: "{{ gdrive_sa_json }}"
    dest: /root/.config/gdrive/service-account.json
    mode: "0600"
  no_log: true

- name: Configure rclone gdrive remote (service account)
  ansible.builtin.command:
    argv:
      - rclone
      - config
      - create
      - gdrive
      - drive
      - scope=drive
      - service_account_file=/root/.config/gdrive/service-account.json
  changed_when: false

- name: Require rclone_remote
  ansible.builtin.assert:
    that: rclone_remote | length > 0
    fail_msg: "Set rclone_remote in group_vars/cloud.yml, e.g. gdrive:faceswap-train"

- name: Deploy cloud-sync runner
  ansible.builtin.template:
    src: cloud-sync.sh.j2
    dest: /root/cloud-sync.sh
    mode: "0755"

- name: Remove stale VAST_API_KEY crontab env line (if present from old setup)
  ansible.builtin.cron:
    name: VAST_API_KEY
    env: true
    state: absent

- name: Schedule the rclone cloud-sync
  ansible.builtin.cron:
    name: faceswap-cloud-sync
    minute: "*/{{ cc_interval_min }}"
    job: "/root/cloud-sync.sh"
