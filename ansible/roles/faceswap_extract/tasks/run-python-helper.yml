---
# Run a faceswap data-processing helper (dedupe/blur) via docker | native.
# Caller sets: helper_script, helper_env (SRC/OUT/THRESH, repo-relative paths).

- name: "{{ helper_script }} (docker)"
  community.docker.docker_container:
    name: "faceswap-helper"
    image: "{{ fs_image }}"
    platform: "{{ fs_platform }}"
    working_dir: /fs
    env: "{{ helper_env }}"
    volumes:
      - "{{ fs_repo_root }}:/fs"
      - "{{ role_path }}/files:/helpers:ro"
    command: "python /helpers/{{ helper_script }}"
    detach: false
    cleanup: true
  when: fs_local_backend == 'docker'

- name: "{{ helper_script }} (native)"
  ansible.builtin.command:
    chdir: "{{ fs_repo_root }}"
    argv:
      - "{{ local_python }}"
      - "{{ role_path }}/files/{{ helper_script }}"
  environment: "{{ helper_env }}"
  changed_when: true
  when: fs_local_backend == 'native'
