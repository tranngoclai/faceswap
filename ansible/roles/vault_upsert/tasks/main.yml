---
# Upsert a single key into an ansible-vault encrypted YAML file.
# Required vars: vault_file, vault_key, vault_value

- name: Require vault password file
  ansible.builtin.stat:
    path: "{{ vault_pass_file }}"
  register: _vp_stat
  failed_when: not _vp_stat.stat.exists

- name: Decrypt vault to temp file
  ansible.builtin.command:
    cmd: >
      ansible-vault decrypt
      --vault-password-file {{ vault_pass_file }}
      --output {{ _vault_upsert_tmp }}
      {{ vault_file }}
  changed_when: true
  no_log: true

- name: Upsert key in plaintext vault
  ansible.builtin.lineinfile:
    path: "{{ _vault_upsert_tmp }}"
    regexp: "^{{ vault_key }}:"
    line: '{{ vault_key }}: {{ vault_value | to_json }}'
  no_log: true

- name: Re-encrypt vault file
  ansible.builtin.command:
    cmd: >
      ansible-vault encrypt
      --vault-password-file {{ vault_pass_file }}
      --output {{ vault_file }}
      {{ _vault_upsert_tmp }}
  changed_when: true
  no_log: true

- name: Remove temp plaintext file
  ansible.builtin.file:
    path: "{{ _vault_upsert_tmp }}"
    state: absent
