---
# Mirrors docker-faceswap.sh / convert-faces.sh `convert`: apply a trained model
# onto the source media -> swapped output. Supports docker | native.

- name: Assert source media exists
  ansible.builtin.stat:
    path: "{{ fs_repo_root }}/{{ fs_input }}"
  register: conv_src
  failed_when: not conv_src.stat.exists

- name: Assert model dir exists
  ansible.builtin.stat:
    path: "{{ fs_repo_root }}/{{ fs_model_dir }}"
  register: conv_model
  failed_when: not conv_model.stat.exists or not conv_model.stat.isdir

- name: Ensure output dir
  ansible.builtin.file:
    path: "{{ fs_repo_root }}/{{ fs_output }}"
    state: directory
    mode: "0755"

- name: Check identity-filter ref dir
  ansible.builtin.stat:
    path: "{{ fs_repo_root }}/{{ fs_ref_dir }}"
  register: conv_ref_stat

- name: Build optional convert args
  ansible.builtin.set_fact:
    fs_convert_opt: >-
      {{ ('-p ' ~ fs_alignments) if fs_alignments | length > 0 else '' }}
      {{ ('-a ' ~ fs_aligned_dir) if fs_aligned_dir | length > 0 else '' }}
      {{ ('-f ' ~ fs_ref_dir ~ ' -l ' ~ fs_ref_threshold)
         if (fs_ref_dir | length > 0) and (conv_ref_stat.stat.isdir | default(false))
         else '' }}

- name: Convert (docker)
  community.docker.docker_container:
    name: "faceswap-convert"
    image: "{{ fs_image }}"
    platform: "{{ fs_platform }}"
    working_dir: /fs
    env:
      KERAS_BACKEND: "{{ keras_backend }}"
    volumes:
      - "{{ fs_repo_root }}:/fs"
      - "{{ fs_docker_cache_volume }}:/fs/.fs_cache"
    command: >-
      python faceswap.py convert -i {{ fs_input }} -o {{ fs_output }} -m {{ fs_model_dir }}
      -w {{ fs_writer }} -c {{ fs_color_adj }} -M {{ fs_mask_type }} -O {{ fs_output_scale }}
      {{ fs_convert_opt }}
    detach: false
    cleanup: true
  when: fs_local_backend == 'docker'

- name: Convert (native)
  ansible.builtin.command:
    chdir: "{{ fs_repo_root }}"
    cmd: >-
      {{ local_python }} faceswap.py convert -i {{ fs_input }} -o {{ fs_output }} -m {{ fs_model_dir }}
      -w {{ fs_writer }} -c {{ fs_color_adj }} -M {{ fs_mask_type }} -O {{ fs_output_scale }}
      {{ fs_convert_opt }}
  environment:
    KERAS_BACKEND: "{{ keras_backend }}"
    FACESWAP_BACKEND: "{{ faceswap_backend_engine }}"
  changed_when: true
  when: fs_local_backend == 'native'

- name: Report
  ansible.builtin.debug:
    msg: "Convert complete -> {{ fs_output }}"
