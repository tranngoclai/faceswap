---
# Mint a deploy key for serverless endpoint management and save it locally
# on the control machine. This key is NEVER injected into workers.
#
# Valid scopes accepted by the Vast API (standard account):
#   misc, user_read, user_write, account_read, account_write,
#   instance_read, instance_write, billing_read, billing_write,
#   machine_read, machine_write, team_read, team_write
# agents_read/agents_write require elevated account tier and are excluded here.
# misc + instance_read + instance_write covers Serverless SDK calls:
#   Deployment(), deployment.ensure_ready(), deployment.remote().

- name: Require an admin/primary vast key
  ansible.builtin.assert:
    that: vast_admin_key | length > 0
    fail_msg: "Set VAST_ADMIN_KEY (admin/primary key) in the environment first."

- name: Create and store deploy credential
  block:
    - name: Create deploy API key (misc + instance_read + instance_write)
      ansible.builtin.uri:
        url: "https://console.vast.ai/api/v0/auth/apikeys/"
        method: POST
        headers:
          Authorization: "Bearer {{ vast_admin_key }}"
        body_format: json
        body:
          name: "{{ vast_deploy_key_name }}"
          permissions:
            api:
              misc: {}
              instance_read: {}
              instance_write: {}
        status_code: 200
      register: deploy_key_response
      no_log: true

    - name: Hold deploy key only in memory
      ansible.builtin.set_fact:
        vast_new_deploy_key: "{{ deploy_key_response.json.key }}"
      no_log: true

    - name: Save deploy key to ~/.config/vastai/vast_deploy_key (mode 600)
      ansible.builtin.copy:
        content: "{{ vast_new_deploy_key }}"
        dest: "~/.config/vastai/vast_deploy_key"
        mode: "0600"
      no_log: true

  rescue:
    - name: Revoke newly-created deploy key after provisioning failure
      ansible.builtin.uri:
        url: "https://console.vast.ai/api/v0/auth/apikeys/{{ deploy_key_response.json.id }}/"
        method: DELETE
        headers:
          Authorization: "Bearer {{ vast_admin_key }}"
        status_code: 200
      when:
        - deploy_key_response is defined
        - deploy_key_response.json is defined
        - deploy_key_response.json.id is defined
      no_log: true

    - name: Stop after deploy key provisioning failure
      ansible.builtin.fail:
        msg: >-
          Deploy key provisioning failed; any partially-created key has been
          revoked automatically.

- name: Show non-secret provisioning result
  ansible.builtin.debug:
    msg: >-
      Deploy key id {{ deploy_key_response.json.id }} created with name
      '{{ vast_deploy_key_name }}'; saved to ~/.config/vastai/vast_deploy_key.
