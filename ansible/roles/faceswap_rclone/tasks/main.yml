---
# rclone copy between a local dir and an R2 remote.
# Direction via rclone_direction: push|pull.
# rclone_local: local path; rclone_remote: R2 path, e.g. "r2:faceswap-storage/ws/train".
# R2 credentials (r2_access_key_id, r2_secret_access_key, r2_endpoint) from vault.

- name: Require rclone remote and local
  ansible.builtin.assert:
    that:
      - rclone_remote | length > 0
      - rclone_local | length > 0
    fail_msg: "Set rclone_remote (R2 path) and rclone_local (local dir)."

- name: Ensure local dir exists
  ansible.builtin.file:
    path: "{{ rclone_local }}"
    state: directory
    mode: "0755"

- name: "rclone {{ rclone_direction }}"
  ansible.builtin.command:
    cmd: >-
      rclone copy -v
      {{ (rclone_direction == 'pull') | ternary(rclone_remote, rclone_local) }}
      {{ (rclone_direction == 'pull') | ternary(rclone_local, rclone_remote) }}
  environment:
    RCLONE_CONFIG_R2_TYPE: "s3"
    RCLONE_CONFIG_R2_PROVIDER: "Cloudflare"
    RCLONE_CONFIG_R2_ACCESS_KEY_ID: "{{ r2_access_key_id }}"
    RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: "{{ r2_secret_access_key }}"
    RCLONE_CONFIG_R2_ENDPOINT: "{{ r2_endpoint }}"
  register: rclone_run
  changed_when: "'Transferred:' in rclone_run.stderr or rclone_run.rc == 0"
