---
# rclone push/pull the model dir against a Google Drive remote authenticated via
# service account. Direction via rclone_direction: push|pull.
# Prereq: GDRIVE_SA_JSON must be set as a Vast.ai instance environment variable.

- name: Require an rclone remote
  ansible.builtin.assert:
    that: rclone_remote | length > 0
    fail_msg: "Set rclone_remote, e.g. -e rclone_remote=gdrive:faceswap-model"

- name: Require gdrive_sa_json (from vault.yml)
  ansible.builtin.assert:
    that: gdrive_sa_json | length > 0
    fail_msg: "Run playbooks/provision-gdrive-sa-key.yml to populate vault.yml first."

- name: Ensure gdrive credentials dir
  ansible.builtin.file:
    path: /root/.config/gdrive
    state: directory
    mode: "0700"

- name: Write service account JSON to disk
  ansible.builtin.copy:
    content: "{{ gdrive_sa_json }}"
    dest: /root/.config/gdrive/service-account.json
    mode: "0600"
  no_log: true

- name: Configure rclone gdrive remote (service account)
  ansible.builtin.command:
    argv:
      - rclone
      - config
      - create
      - gdrive
      - drive
      - scope=drive
      - service_account_file=/root/.config/gdrive/service-account.json
  changed_when: false

- name: Ensure model dir exists
  ansible.builtin.file:
    path: "{{ fs_train_model_dir }}"
    state: directory
    mode: "0755"

- name: "rclone {{ rclone_direction }} model dir"
  ansible.builtin.command:
    argv:
      - rclone
      - copy
      - "{{ (rclone_direction == 'pull') | ternary(rclone_remote, fs_train_model_dir) }}"
      - "{{ (rclone_direction == 'pull') | ternary(fs_train_model_dir, rclone_remote) }}"
  register: rclone_run
  changed_when: "'Transferred:' in rclone_run.stderr"
