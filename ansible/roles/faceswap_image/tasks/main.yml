---
# Mirrors docker-faceswap.sh `build`: build the local CPU image (deps baked in).

- name: Build faceswap CPU image
  community.docker.docker_image:
    name: "{{ fs_image }}"
    source: build
    build:
      path: "{{ fs_repo_root }}"
      dockerfile: "ansible/roles/faceswap_image/files/Dockerfile.cpu"
      platform: "{{ fs_platform }}"
    force_source: "{{ fs_image_rebuild | default(false) }}"
    state: present
